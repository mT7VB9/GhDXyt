<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>原神·</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0e0e1a, #05050c);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px 80px 20px;
            position: relative;
        }

        /* 主容器 */
        .main-stage {
            max-width: 580px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* ========= 视频卡片 (原神.mp4) 位于音乐播放器上方 ========= */
        .video-card {
            width: 100%;
            background: rgba(20, 20, 34, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 20px 22px 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 210, 90, 0.2);
            transition: all 0.3s ease;
        }

        .video-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            padding: 0 8px;
        }

        .video-title span {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffdd99, #ffbb66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .video-badge {
            background: rgba(255, 200, 100, 0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: #ffdd99;
            border: 1px solid rgba(255, 200, 100, 0.4);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        video {
            width: 100%;
            display: block;
            vertical-align: middle;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .video-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 14px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .vid-btn {
            background: rgba(30, 30, 50, 0.9);
            border: none;
            color: #ffdd99;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 210, 90, 0.3);
        }

        .vid-btn:hover {
            background: #ffaa33;
            color: #1e1e2e;
            border-color: #ffcc66;
            transform: scale(0.97);
        }

        .volume-slider {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 60px;
        }

        .volume-slider label {
            font-size: 12px;
            color: #ddd;
        }

        input[type="range"] {
            width: 90px;
            height: 3px;
            -webkit-appearance: none;
            background: #ffcc66;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        /* 音乐播放器卡片 */
        .box {
            width: 100%;
            background: rgba(26, 26, 40, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 34px 28px 38px;
            text-align: center;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 110, 0.2);
            transition: transform 0.25s;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .title {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ffdd77;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }

        .tip {
            font-size: 14px;
            color: #bcbce6;
            margin-bottom: 28px;
        }

        .play-btn {
            background: linear-gradient(135deg, #ffde8a, #ffb847);
            border: none;
            color: #1f1f2f;
            font-size: 20px;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(255, 180, 50, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0 8px;
        }

        .play-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #ffe699, #ffc25e);
            box-shadow: 0 12px 26px rgba(255, 200, 70, 0.5);
        }

        .status {
            font-size: 13px;
            margin-top: 20px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 60px;
            display: inline-block;
            color: #dedeff;
            backdrop-filter: blur(4px);
        }

        .status.success {
            color: #c6ffb0;
        }

        /* 右下角动态弹窗 */
        .floating-window {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 1000;
            cursor: pointer;
            width: 130px;
            height: 130px;
            border-radius: 28px;
            background: linear-gradient(145deg, #2a2a3a, #1e1e2c);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 215, 100, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            backdrop-filter: blur(2px);
            overflow: hidden;
        }

        .floating-window::before {
            content: "";
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 32px;
            background: linear-gradient(115deg, #ffb347, #ffdd77, #f9a602, #ffcc66, #ffb347);
            background-size: 300% 300%;
            z-index: -2;
            animation: rotateGlow 3s ease infinite;
            opacity: 0.9;
            filter: blur(3px);
        }

        .floating-window::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: radial-gradient(circle at 30% 20%, rgba(255,215,120,0.2), transparent 70%);
            pointer-events: none;
        }

        .window-content {
            position: relative;
            z-index: 3;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            background: linear-gradient(135deg, #fff2cf, #ffe0a3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .window-content span:first-child {
            font-size: 32px;
        }

        .window-content span:last-child {
            font-size: 18px;
            font-weight: 800;
        }

        .floating-window:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6), 0 0 0 3px rgba(255, 200, 100, 0.5);
        }

        @keyframes rotateGlow {
            0% { background-position: 0% 50%; filter: blur(4px); opacity: 0.7; }
            50% { background-position: 100% 50%; filter: blur(6px); opacity: 1; }
            100% { background-position: 0% 50%; filter: blur(4px); opacity: 0.7; }
        }

        @media (max-width: 550px) {
            .floating-window {
                width: 110px;
                height: 110px;
                bottom: 20px;
                right: 20px;
                border-radius: 24px;
            }
            .window-content span:first-child { font-size: 28px; }
            .window-content span:last-child { font-size: 16px; }
            .video-title span { font-size: 16px; }
        }

        .info-tip {
            font-size: 11px;
            color: #6a6a8a;
            margin-top: 6px;
        }

        footer {
            margin-top: 20px;
            font-size: 11px;
            color: #5a5a7a;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="main-stage">
    <!-- 原神.mp4 视频区域 (位于音乐播放器上面) -->
    <div class="video-card">
        <div class="video-title">
            <span>🎬 原神 · </span>
            <div class="video-badge">✨ 原神.视频</div>
        </div>
        <div class="video-wrapper" id="videoWrapper">
            <video id="genshinVideo" preload="metadata" poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 9'%3E%3Crect width='100%25' height='100%25' fill='%23222'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23ffcc77' font-size='4'%3E原神 映像%3C/text%3E%3C/svg%3E">
                <source src="原神.mp4" type="video/mp4">
                您的浏览器不支持 video 标签，无法播放原神.mp4
            </video>
        </div>
        <div class="video-controls">
            <button class="vid-btn" id="playVidBtn">▶ 播放视频</button>
            <button class="vid-btn" id="pauseVidBtn">⏸ 暂停</button>
            <div class="volume-slider">
                <label>🔊</label>
                <input type="range" id="videoVolume" min="0" max="1" step="0.02" value="0.5">
            </div>
        </div>
        <div class="info-tip">💡 视频与音乐独立控制，可同时沉浸原神世界</div>
    </div>

    <!-- 音乐播放器 -->
    <div class="box">
        <div class="title">🎵 原神 · 风与牧歌</div>
        <div class="tip">✨ 聆听旅途旋律，轻触播放 ✨</div>
        <button class="play-btn" id="playBtn">▶ 播放音乐</button>
        <div class="status" id="statusMsg">🎼 等待您的召唤</div>
    </div>
</div>

<footer>🍃 音乐循环播放 | 右下角弹窗可前往官网 | 视频与音乐各自独立音量</footer>

<!-- 右下角弹窗 原神下载 跳转官网 -->
<div class="floating-window" id="genshinPopup">
    <div class="window-content">
        <span>✨</span>
        <span>原神下载</span>
    </div>
</div>

<!-- 音频元素 -->
<audio loop id="bgm">
    <source src="元神.mp3" type="audio/mpeg">
    您的浏览器不支持音频。
</audio>

<script>
    (function() {
        // ---------- 1. 音乐逻辑 (元神.mp3) ----------
        const audio = document.getElementById('bgm');
        const playBtn = document.getElementById('playBtn');
        const statusDiv = document.getElementById('statusMsg');
        
        let musicPlaying = false;
        let musicFileError = false;

        // 音乐错误处理
        audio.addEventListener('error', function(e) {
            musicFileError = true;
            statusDiv.innerHTML = '❌ 音乐文件缺失！请确保“元神.mp3”与网页同目录';
            playBtn.disabled = true;
            playBtn.style.opacity = '0.5';
            playBtn.style.cursor = 'not-allowed';
            playBtn.innerHTML = '⚠️ 元神.mp3 未找到';
            console.error('音乐加载错误: 未找到元神.mp3');
        });

        // 可播放就绪状态
        audio.addEventListener('canplaythrough', () => {
            if (!musicFileError && !musicPlaying) {
                statusDiv.innerHTML = '✅ 音乐就绪 · 轻触开始';
                statusDiv.classList.add('success');
            }
        });

        function updateMusicUI(playing) {
            if (playing) {
                playBtn.innerHTML = '🔊 播放中 · 点击暂停';
                statusDiv.innerHTML = '🎶 风与牧歌之城 · 悠然循环';
                statusDiv.classList.add('success');
            } else {
                playBtn.innerHTML = '▶ 播放音乐';
                statusDiv.innerHTML = '⏸ 暂停小憩 · 点击继续旅途';
            }
        }

        function startMusic() {
            if (musicFileError) return;
            const promise = audio.play();
            if (promise !== undefined) {
                promise.then(() => {
                    musicPlaying = true;
                    updateMusicUI(true);
                }).catch(err => {
                    console.warn('音乐播放失败:', err);
                    if (err.name === 'NotAllowedError') {
                        statusDiv.innerHTML = '🔇 点击“播放音乐”按钮开启旋律';
                    } else {
                        statusDiv.innerHTML = '⚠️ 播放失败，请再试一次';
                    }
                    musicPlaying = false;
                    playBtn.innerHTML = '▶ 播放音乐';
                });
            }
        }

        function pauseMusic() {
            audio.pause();
            musicPlaying = false;
            updateMusicUI(false);
        }

        function toggleMusic() {
            if (musicFileError) return;
            if (!musicPlaying || audio.paused) {
                startMusic();
            } else {
                pauseMusic();
            }
        }

        playBtn.addEventListener('click', toggleMusic);
        
        // 监听play/pause事件辅助更新按钮样式（避免其他干扰）
        audio.addEventListener('play', () => {
            musicPlaying = true;
            playBtn.innerHTML = '🔊 播放中 · 点击暂停';
            statusDiv.innerHTML = '🎶 风与牧歌之城 · 悠然循环';
        });
        audio.addEventListener('pause', () => {
            musicPlaying = false;
            playBtn.innerHTML = '▶ 播放音乐';
            statusDiv.innerHTML = '⏸ 暂停小憩 · 点击继续旅途';
        });
        
        audio.load(); // 预加载

        // ---------- 2. 视频逻辑 (原神.mp4) 独立处理 ----------
        const video = document.getElementById('genshinVideo');
        const playVidBtn = document.getElementById('playVidBtn');
        const pauseVidBtn = document.getElementById('pauseVidBtn');
        const volumeSlider = document.getElementById('videoVolume');
        
        let videoFileErrorFlag = false;
        let videoUserInteracted = false;

        // 错误检测：如果原神.mp4 不存在则显示友好提示
        video.addEventListener('error', (e) => {
            videoFileErrorFlag = true;
            console.warn('视频文件加载失败: 请确保"原神.mp4"与网页在同一目录');
            // 在视频容器覆盖一个提示信息
            const wrapper = document.querySelector('.video-wrapper');
            const errMsg = document.createElement('div');
            errMsg.style.position = 'absolute';
            errMsg.style.top = '0';
            errMsg.style.left = '0';
            errMsg.style.right = '0';
            errMsg.style.bottom = '0';
            errMsg.style.background = 'rgba(0,0,0,0.85)';
            errMsg.style.display = 'flex';
            errMsg.style.alignItems = 'center';
            errMsg.style.justifyContent = 'center';
            errMsg.style.color = '#ffaa66';
            errMsg.style.fontSize = '14px';
            errMsg.style.borderRadius = '28px';
            errMsg.style.backdropFilter = 'blur(10px)';
            errMsg.innerHTML = '⚠️ 未找到 原神.mp4<br>请将视频文件放置于同一目录';
            errMsg.style.flexDirection = 'column';
            errMsg.style.gap = '8px';
            errMsg.style.textAlign = 'center';
            errMsg.style.padding = '16px';
            wrapper.style.position = 'relative';
            if (!wrapper.querySelector('.video-error-overlay')) {
                errMsg.classList.add('video-error-overlay');
                wrapper.appendChild(errMsg);
            }
            // 禁用视频按钮
            playVidBtn.disabled = true;
            pauseVidBtn.disabled = true;
            volumeSlider.disabled = true;
            playVidBtn.style.opacity = '0.5';
            pauseVidBtn.style.opacity = '0.5';
        });
        
        // 视频可播放时去除隐藏错误提示（如果有）
        video.addEventListener('canplay', () => {
            const overlay = document.querySelector('.video-error-overlay');
            if (overlay) overlay.remove();
        });
        
        // 播放视频（用户手势触发，避免autoplay策略，但按钮会调用）
        function safePlayVideo() {
            if (videoFileErrorFlag) return;
            const promise = video.play();
            if (promise !== undefined) {
                promise.catch(err => {
                    console.warn('视频自动播放限制，需用户手动点按钮', err);
                    if (err.name === 'NotAllowedError') {
                        // 显示临时轻提示，但不影响再次点击
                        const tipSpan = document.createElement('div');
                        tipSpan.innerText = '👆 浏览器需要交互，再点一次播放即可';
                        tipSpan.style.position = 'absolute';
                        tipSpan.style.bottom = '40px';
                        tipSpan.style.left = '20px';
                        tipSpan.style.backgroundColor = '#ffcc66';
                        tipSpan.style.color = '#1e1e2e';
                        tipSpan.style.padding = '4px 12px';
                        tipSpan.style.borderRadius = '40px';
                        tipSpan.style.fontSize = '12px';
                        tipSpan.style.zIndex = '99';
                        const wrapper = document.querySelector('.video-wrapper');
                        wrapper.style.position = 'relative';
                        wrapper.appendChild(tipSpan);
                        setTimeout(() => tipSpan.remove(), 2000);
                    }
                });
            }
        }

        playVidBtn.addEventListener('click', () => {
            if (videoFileErrorFlag) return;
            safePlayVideo();
            videoUserInteracted = true;
        });
        
        pauseVidBtn.addEventListener('click', () => {
            if (videoFileErrorFlag) return;
            video.pause();
        });
        
        // 音量控制
        if (volumeSlider) {
            volumeSlider.addEventListener('input', (e) => {
                if (video) video.volume = parseFloat(e.target.value);
            });
            // 初始化视频音量为0.5
            if (video) video.volume = 0.5;
        }
        
        // 点击视频区域也可以播放/暂停（便捷）
        const videoWrapper = document.getElementById('videoWrapper');
        if (videoWrapper) {
            videoWrapper.addEventListener('click', (e) => {
                if (videoFileErrorFlag) return;
                e.stopPropagation();
                if (video.paused) {
                    safePlayVideo();
                } else {
                    video.pause();
                }
            });
        }
        
        // 监听视频状态，可以不用额外界面，但提供完美体验
        video.addEventListener('play', () => {
            playVidBtn.innerHTML = '▶ 播放中';
        });
        video.addEventListener('pause', () => {
            playVidBtn.innerHTML = '▶ 播放视频';
        });
        
        // 页面初始化预加载视频元数据但不自动播放（避免浏览器冲突）
        if (video) {
            video.load();
            // 确保不自动播放
            video.pause();
        }

        // ---------- 3. 右下角弹窗跳转原神官网 ----------
        const popupBtn = document.getElementById('genshinPopup');
        const genshinOfficialUrl = 'https://ys.mihoyo.com/';   // 原神大陆官网
        
        popupBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            popupBtn.style.transform = 'scale(0.96)';
            setTimeout(() => { popupBtn.style.transform = ''; }, 120);
            window.open(genshinOfficialUrl, '_blank', 'noopener,noreferrer');
        });
        
        // 附加: 轻提示让用户知道视频文件可独立存在
        console.log('✨ 加载完成 | 音乐文件: 元神.mp3 , 视频文件: 原神.mp4 需同目录 ✨');
        
        // 兜底: 如果音乐播放前无交互且用户点击视频区域时也能提示促进音乐, 但音乐保持独立互不干扰
        // 提升体验: 若音乐文件缺失但视频存在, 不影响视频播放
    })();
</script>
</body>
</html>
